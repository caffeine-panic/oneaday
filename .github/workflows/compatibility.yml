name: Registry compatibility matrix

on:
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * 1"
  push:
    branches: [master]
    paths:
      - "src-tauri/**"
      - "scripts/compatibility-test.sh"
      - ".github/workflows/compatibility.yml"

permissions:
  contents: read

jobs:
  live-contract:
    name: ${{ matrix.protocol }} ${{ matrix.version }}
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - protocol: etcd
            version: 3.6.11
            api: ""
          - protocol: etcd
            version: 3.7.0
            api: ""
          - protocol: zookeeper
            version: 3.8.6
            api: ""
          - protocol: zookeeper
            version: 3.9.5
            api: ""
          - protocol: nacos
            version: 2.5.2
            api: v2
          - protocol: nacos
            version: 3.2.3
            api: v3

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          workspaces: src-tauri -> target

      - name: Run isolated real-service contract
        run: ./scripts/compatibility-test.sh "${{ matrix.protocol }}" "${{ matrix.version }}" "${{ matrix.api }}"
