name: Quality and desktop build

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  desktop:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu 22.04
            runner: ubuntu-22.04
          - name: Windows 2025
            runner: windows-2025
          - name: macOS 15
            runner: macos-15

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf protobuf-compiler

      - name: Install macOS protobuf compiler
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install Windows protobuf compiler
        if: runner.os == 'Windows'
        run: choco install protoc --no-progress -y

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Verify formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Lint Rust targets
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --quiet

      - name: Build frontend
        run: npm run build

      - name: Build desktop release binary
        run: npm run tauri build -- --no-bundle
