[package]
name = "atlas-registry"
version = "0.1.0"
description = "A unified registry center desktop client"
authors = ["Atlas Registry contributors"]
edition = "2021"

[lib]
name = "atlas_registry_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tauri = { version = "2", features = [] }
tauri-plugin-shell = "2"
