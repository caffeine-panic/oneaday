<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atlas Registry — PROTOTYPE</title>
  <style>
    :root { --bg:#0b1017; --panel:#111925; --panel2:#172231; --line:#263447; --text:#e9f0f7; --muted:#91a0b2; --cyan:#55d6be; --blue:#6aa9ff; --amber:#ffc76b; --red:#ff7b82; --radius:14px; font-family:Inter,ui-sans-serif,system-ui,-apple-system,"PingFang SC",sans-serif; }
    * { box-sizing:border-box } body { margin:0; background:var(--bg); color:var(--text); min-height:100vh; font-size:14px } button,input,textarea { font:inherit } button { cursor:pointer }
    .appbar { height:58px; display:flex; align-items:center; padding:0 22px; border-bottom:1px solid var(--line); background:#0d141d; gap:20px }
    .brand { font-weight:800; letter-spacing:-.02em; font-size:17px; display:flex; align-items:center; gap:10px }.logo { width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,var(--cyan),var(--blue));display:grid;place-items:center;color:#071018;font-weight:900 }.proto { color:var(--amber);font-size:10px;border:1px solid #725b34;border-radius:20px;padding:3px 7px;letter-spacing:.08em }
    .spacer { flex:1 }.muted { color:var(--muted) }.iconbtn,.btn { border:1px solid var(--line);color:var(--text);background:var(--panel2);border-radius:9px;padding:8px 11px }.btn.primary { background:var(--cyan); color:#06120f; border-color:var(--cyan);font-weight:700 }.btn.ghost { background:transparent }.btn.danger { color:var(--red) }.row { display:flex;align-items:center;gap:10px }.dot { width:8px;height:8px;border-radius:50%;display:inline-block;background:var(--cyan);box-shadow:0 0 10px #55d6be88 }.tag { font-size:11px;padding:3px 7px;border-radius:6px;background:#243247;color:#afbdd0 }.tag.etcd{color:#7fe9d3}.tag.zk{color:#9bc4ff}.tag.nacos{color:#ffd28a}
    .search { background:#0c131d;border:1px solid var(--line);color:var(--text);border-radius:9px;padding:9px 12px;outline:none;min-width:220px }.search:focus { border-color:var(--blue) }
    .node { display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:7px;color:#c8d3df;cursor:pointer;white-space:nowrap }.node:hover,.node.active { background:#223047;color:white }.indent1{padding-left:28px}.indent2{padding-left:48px}.chev{color:#617187;width:10px}.folder{color:var(--amber)}.key{color:var(--cyan)}
    .editor { width:100%;min-height:230px;resize:none;border:1px solid var(--line);background:#09101a;color:#d8e6f3;border-radius:10px;padding:15px;line-height:1.6;font-family:"SFMono-Regular",Consolas,monospace;outline:none }.editor:focus{border-color:var(--blue)}
    .section-title { font-size:12px;text-transform:uppercase;letter-spacing:.09em;color:#75869b;font-weight:700 }.title { font-size:22px;font-weight:750;letter-spacing:-.025em }.crumb { color:#94a4b7 }.crumb b { color:var(--text) }.card { background:var(--panel);border:1px solid var(--line);border-radius:var(--radius) }.stat { padding:15px }.stat strong { display:block;font-size:20px;margin-top:5px }
    /* A: classic data explorer */
    .va { display:grid;grid-template-columns:238px 310px 1fr;height:calc(100vh - 58px) }.va>aside,.va>.tree { border-right:1px solid var(--line) }.connections { padding:18px 13px }.conn { padding:11px;border-radius:10px;margin:5px 0;cursor:pointer }.conn.active{background:#1b2938}.conn:hover{background:#172331}.conn small{display:block;color:var(--muted);margin:5px 0 0 18px}.tree{padding:18px 13px;overflow:auto;background:#0d141e}.tree-head{padding:0 8px 13px}.detail{padding:24px 28px;overflow:auto}.detail-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:22px 0}.toolbar{display:flex;justify-content:space-between;align-items:center;margin:14px 0}.meta{display:grid;grid-template-columns:130px 1fr;gap:10px;padding:18px 0;border-top:1px solid var(--line);color:var(--muted)}.meta b{color:#cbd7e3}
    /* B: command center */
    .vb { padding:24px 28px 100px;max-width:1440px;margin:auto }.hero { display:flex;align-items:end;justify-content:space-between;margin:5px 0 22px }.hero .title{font-size:27px}.bgrid { display:grid;grid-template-columns:1.5fr 1fr;gap:16px }.cluster-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}.cluster{padding:17px;cursor:pointer}.cluster:hover,.cluster.active{border-color:#4f7194;background:#152231}.cluster h3{margin:10px 0 6px}.health{display:flex;gap:15px;color:var(--muted);font-size:12px}.quick{padding:18px}.quick input{width:100%;font-size:17px;padding:14px;margin:12px 0}.recent{padding:18px}.table{width:100%;border-collapse:collapse}.table td,.table th{text-align:left;padding:12px;border-bottom:1px solid var(--line)}.table th{color:var(--muted);font-size:11px;text-transform:uppercase}.activity{padding:18px}.event{padding:13px 0;border-bottom:1px solid var(--line)}.event p{margin:4px 0;color:#c9d4df}.event small{color:var(--muted)}
    /* C: focused inspector */
    .vc { height:calc(100vh - 58px);display:grid;grid-template-columns:64px 1fr;background:#0c121b }.rail{border-right:1px solid var(--line);display:flex;align-items:center;flex-direction:column;padding:14px 0;gap:10px}.rail button{width:38px;height:38px;border-radius:10px;border:0;background:transparent;color:#8191a4}.rail button.active,.rail button:hover{background:#203044;color:white}.workspace{max-width:1120px;width:100%;margin:0 auto;padding:28px 32px 100px;overflow:auto}.pathbar{display:flex;gap:8px;align-items:center;background:var(--panel);padding:9px;border:1px solid var(--line);border-radius:12px}.pathbar .search{flex:1;border:0;background:transparent}.split{display:grid;grid-template-columns:1fr 300px;gap:18px;margin-top:18px}.codecard{padding:18px}.tabs{display:flex;gap:18px;border-bottom:1px solid var(--line);margin-bottom:16px}.tab{padding:9px 2px;border-bottom:2px solid transparent;color:var(--muted)}.tab.active{border-color:var(--cyan);color:white}.sidecard{padding:17px;margin-bottom:12px}.kv{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--line);color:var(--muted)}.kv b{color:#dce6ef;font-weight:500}.siblings .node{margin:2px 0}
    .switcher { position:fixed;left:50%;bottom:18px;transform:translateX(-50%);display:flex;align-items:center;gap:4px;padding:6px;background:#f2f5f8;color:#101820;border:1px solid white;border-radius:14px;box-shadow:0 12px 40px #000b;z-index:20 }.switcher button{width:34px;height:34px;border:0;border-radius:9px;background:transparent;font-size:18px}.switcher button:hover{background:#dce3e8}.switch-label{min-width:210px;text-align:center;font-weight:750;font-size:13px}.toast{position:fixed;right:18px;bottom:18px;background:#dffcf5;color:#0b3229;padding:11px 16px;border-radius:10px;opacity:0;transform:translateY(10px);transition:.2s;z-index:30}.toast.show{opacity:1;transform:none}
    @media(max-width:850px){.va{grid-template-columns:210px 1fr}.va>aside{display:none}.bgrid,.split{grid-template-columns:1fr}.cluster-grid{grid-template-columns:1fr}.vc{grid-template-columns:1fr}.rail{display:none}.detail-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <!-- PROTOTYPE: Three variants of a multi-registry client, switchable via ?variant=. -->
  <header class="appbar"><div class="brand"><span class="logo">A</span> Atlas Registry</div><span class="proto">PROTOTYPE</span><div class="spacer"></div><span class="muted">只读模式</span><button class="btn primary" data-action="connect">＋ 新建连接</button></header>
  <main id="root"></main>
  <div class="switcher"><button id="prev" aria-label="上一方案">←</button><div class="switch-label" id="variantLabel"></div><button id="next" aria-label="下一方案">→</button></div>
  <div class="toast" id="toast">原型操作已模拟</div>
  <script>
    const data = { value: '{\n  "service": "payment-api",\n  "version": "2.4.1",\n  "timeout": 3000,\n  "features": {\n    "riskCheck": true,\n    "shadowTraffic": false\n  }\n}', variants:[['A','资源管理器'],['B','集群控制台'],['C','聚焦检查器']] };
    const tree = `<div class="node"><span class="chev">⌄</span><span class="folder">◆</span> /services</div><div class="node indent1"><span class="chev">⌄</span><span class="folder">◆</span> payment</div><div class="node indent2 active"><span class="chev"></span><span class="key">◇</span> config.json</div><div class="node indent2"><span class="chev"></span><span class="key">◇</span> instances</div><div class="node indent1"><span class="chev">›</span><span class="folder">◆</span> checkout</div><div class="node"><span class="chev">›</span><span class="folder">◆</span> /locks</div><div class="node"><span class="chev">›</span><span class="folder">◆</span> /feature-flags</div>`;
    function A(){return `<div class="va"><aside class="connections"><div class="section-title">连接</div><div class="conn active"><span class="dot"></span> 生产 etcd <span class="tag etcd">etcd</span><small>10.8.0.12:2379</small></div><div class="conn"><span class="dot"></span> 订单 ZK <span class="tag zk">ZK</span><small>3 节点 · 已连接</small></div><div class="conn"><span class="dot"></span> Nacos 开发 <span class="tag nacos">Nacos</span><small>dev.nacos.local</small></div><div style="margin-top:18px"><button class="btn ghost" style="width:100%" data-action="connect">＋ 添加连接</button></div></aside><section class="tree"><div class="tree-head"><div class="row"><b>生产 etcd</b><span class="spacer"></span><button class="iconbtn" data-action="refresh">↻</button></div><input class="search" style="width:100%;min-width:0;margin-top:12px" placeholder="筛选 key..." /></div>${tree}</section><section class="detail"><div class="crumb">生产 etcd / services / payment / <b>config.json</b></div><div class="toolbar"><div class="title">config.json</div><div class="row"><button class="btn danger" data-action="delete">删除</button><button class="btn primary" data-action="save">保存修改</button></div></div><div class="detail-grid"><div class="card stat"><span class="muted">版本</span><strong>42</strong></div><div class="card stat"><span class="muted">租约</span><strong>永久</strong></div><div class="card stat"><span class="muted">大小</span><strong>164 B</strong></div></div><textarea class="editor">${data.value}</textarea><div class="meta"><span>创建版本</span><b>18,294</b><span>修改版本</span><b>20,118 · 2 分钟前</b></div></section></div>`}
    function B(){return `<div class="vb"><div class="hero"><div><div class="section-title">基础设施总览</div><div class="title">早上好，所有注册中心运行正常</div></div><button class="btn primary" data-action="connect">管理连接</button></div><div class="cluster-grid"><div class="card cluster active"><span class="tag etcd">ETCD</span><h3>生产配置中心</h3><div class="health"><span><span class="dot"></span> 健康</span><span>1,284 keys</span><span>12ms</span></div></div><div class="card cluster"><span class="tag zk">ZOOKEEPER</span><h3>订单协调集群</h3><div class="health"><span><span class="dot"></span> 3/3 在线</span><span>486 znodes</span></div></div><div class="card cluster"><span class="tag nacos">NACOS</span><h3>开发环境</h3><div class="health"><span><span class="dot"></span> 健康</span><span>24 服务</span><span>86 实例</span></div></div></div><div class="bgrid"><div><div class="card quick"><div class="section-title">直接定位资源</div><input class="search" placeholder="输入路径、Data ID 或服务名，例如 /services/payment"/><div class="row"><button class="btn primary" data-action="open">打开资源</button><span class="muted">⌘ K 随时搜索</span></div></div><div class="card recent" style="margin-top:16px"><div class="row"><h3>最近访问</h3><span class="spacer"></span><button class="btn ghost">查看全部</button></div><table class="table"><tr><th>资源</th><th>来源</th><th>修改</th></tr><tr><td><span class="key">◇</span> /services/payment/config.json</td><td><span class="tag etcd">etcd</span></td><td>2 分钟前</td></tr><tr><td><span class="folder">◆</span> /orders/leader</td><td><span class="tag zk">ZK</span></td><td>12 分钟前</td></tr><tr><td>payment-api.yaml</td><td><span class="tag nacos">Nacos</span></td><td>昨天</td></tr></table></div></div><aside class="card activity"><div class="row"><h3>实时活动</h3><span class="spacer"></span><span class="dot"></span></div><div class="event"><small>生产 etcd · 2 分钟前</small><p><b>wang</b> 更新了 config.json</p><span class="tag">PUT</span></div><div class="event"><small>订单 ZK · 8 分钟前</small><p>Leader 节点发生切换</p><span class="tag">SESSION</span></div><div class="event"><small>Nacos 开发 · 21 分钟前</small><p>payment-api 注册 2 个实例</p><span class="tag">SERVICE</span></div></aside></div></div>`}
    function C(){return `<div class="vc"><nav class="rail"><button class="active" title="资源">◇</button><button title="搜索">⌕</button><button title="监控">◉</button><span class="spacer"></span><button title="设置">⚙</button></nav><section class="workspace"><div class="row"><span class="tag etcd">ETCD</span><b>生产配置中心</b><span class="dot"></span><span class="muted">已连接</span><span class="spacer"></span><button class="btn ghost" data-action="refresh">↻ 刷新</button></div><div class="pathbar" style="margin-top:18px"><span class="muted">路径</span><input class="search" value="/services/payment/config.json"/><button class="btn primary" data-action="go">前往</button></div><div class="split"><div class="card codecard"><div class="row"><div class="title">config.json</div><span class="tag">JSON</span><span class="spacer"></span><button class="btn primary" data-action="save">保存</button></div><div class="tabs"><div class="tab active">内容</div><div class="tab">历史版本</div><div class="tab">监听事件</div></div><textarea class="editor" style="min-height:390px">${data.value}</textarea></div><aside><div class="card sidecard"><div class="section-title">节点属性</div><div class="kv"><span>版本</span><b>42</b></div><div class="kv"><span>修改版本</span><b>20,118</b></div><div class="kv"><span>租约</span><b>永久</b></div><div class="kv"><span>编码</span><b>UTF-8</b></div></div><div class="card sidecard siblings"><div class="section-title" style="margin-bottom:10px">同级节点</div><div class="node active"><span class="key">◇</span> config.json</div><div class="node"><span class="key">◇</span> instances</div><div class="node"><span class="folder">◆</span> feature-flags</div></div><button class="btn danger" style="width:100%" data-action="delete">删除此节点</button></aside></div></section></div>`}
    let idx=Math.max(0,data.variants.findIndex(v=>v[0]===(new URLSearchParams(location.search).get('variant')||'A'))); const root=document.querySelector('#root');
    function render(){const [key,name]=data.variants[idx];root.innerHTML=key==='A'?A():key==='B'?B():C();document.querySelector('#variantLabel').textContent=`${key} — ${name}`;document.querySelectorAll('[data-action]').forEach(el=>el.onclick=()=>toast(el.textContent.trim()))}
    function move(d){idx=(idx+d+data.variants.length)%data.variants.length;const u=new URL(location);u.searchParams.set('variant',data.variants[idx][0]);history.replaceState({},'',u);render()}
    document.querySelector('#prev').onclick=()=>move(-1);document.querySelector('#next').onclick=()=>move(1);addEventListener('keydown',e=>{if(['INPUT','TEXTAREA'].includes(e.target.tagName)||e.target.isContentEditable)return;if(e.key==='ArrowLeft')move(-1);if(e.key==='ArrowRight')move(1)});
    function toast(label){const t=document.querySelector('#toast');t.textContent=`“${label}”已在原型中模拟`;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1500)} render();
  </script>
</body>
</html>
